name: Terraform Apply Production

concurrency:
  group: terraform-production
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - "version.txt"

env:
  AWS_REGION: ca-central-1
  TF_INPUT: false
  TF_VAR_hosted_zone_id: ${{ secrets.PROD_HOSTED_ZONE_ID }}
  TF_VAR_security_txt_content: ${{ vars.SECURITY_TXT_CDS_SNC_CA }}
  TF_VAR_wordpress_user: ${{ secrets.PROD_WORDPRESS_USER }}
  TF_VAR_wordpress_password: ${{ secrets.PROD_WORDPRESS_PASSWORD }}
  TF_VAR_upptime_status_header: ${{ secrets.PROD_UPPTIME_STATUS_HEADER }}
  
permissions:
  id-token: write
  contents: read

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get version to deploy
        id: get-version
        uses: ./.github/workflows/get-version
        with:
          is-tagged: "true"
  terragrunt-apply:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:

      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@bbde31a2b9ad6eb93565a5c14c5be905af626c41
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          DNS_PROXY_LOGANALYTICSSHAREDKEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.VERSION}}
          persist-credentials: false

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0
        env:
          CONFTEST_VERSION: NONE
          TERRAFORM_VERSION: 1.14.4
          TERRAFORM_CHECKSUM: 4a24b18865d9419ba7882567cb7429dd1525b3e2029a9e38f612d476ba8c3dea
          TERRAGRUNT_VERSION: 0.99.1
          TERRAGRUNT_CHECKSUM: 7d0a7ad656cf175afdf7cb2b8a51721f4a36dbeef5fb3a37b22f1b59aaacee6d
          TF_SUMMARIZE_VERSION: NONE
          TRUFFLEHOG_VERSION: NONE

      - name: Configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.PROD_AWS_ACCOUNT_ID }}:role/cds-superset-docs-apply
          role-session-name: TFApply
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply Terraform
        working-directory: terragrunt/env/prod
        run: terragrunt run --non-interactive -- apply -auto-approve