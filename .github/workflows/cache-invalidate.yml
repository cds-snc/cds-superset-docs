name: Cache invalidate

on:
  workflow_call:
    inputs:
      aws_account_id:
        required: true
        type: string
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID:
        required: true
      LOG_ANALYTICS_WORKSPACE_KEY:
        required: true

env: 
  AWS_REGION: ca-central-1

permissions:
  id-token: write

jobs:
  cache-invalidate:
    runs-on: ubuntu-latest

    steps:
    - name: Audit DNS requests
      uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
      env:
        DNS_PROXY_FORWARDTOSENTINEL: "true"
        DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
        DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
        DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
        DNS_PROXY_WILDCARDGREEDY: "true"

    - name: Configure aws credentials using OIDC
      uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
      with:
        role-to-assume: arn:aws:iam::${{ inputs.aws_account_id }}:role/cds-superset-docs-apply 
        role-session-name: CacheInvalidate
        aws-region: ${{ env.AWS_REGION }}

    - name: Invalidate CloudFront cache
      run: |
        DISTRIBUTION_ID="$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@,'docs.superset')]].Id" --output text)"
        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*"
